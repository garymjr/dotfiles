unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

set -g xterm-keys on
set -g extended-keys on
set -g default-terminal "tmux-256color"
set -s set-clipboard on

# split panes using | and -
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel pbcopy
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel pbcopy

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind x confirm-before -p "kill-pane? (y/n)" kill-pane
bind c new-window -c "#{pane_current_path}"
bind o split-window -c "#{pane_current_path}" lf
bind g new-window -c "#{pane_current_path}" lazygit

set-option -g status-position top

#Start window indexing at 1, not 0
set -g base-index 1
set -g renumber-windows on
set -g pane-base-index 1
set -g display-panes-time 350
set-option -sg escape-time 10
set-option -g focus-events on

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

bind r source-file ~/.tmux.conf

set -g status-interval 10
set -g status-style "bg=#0b1020,fg=#c0caf5"
set -g message-style "bg=#1f2335,fg=#c0caf5"
set -g popup-style "bg=#1f2335,fg=#c0caf5"
set -g popup-border-style "fg=#7aa2f7"
set -g status-left-length 70
set -g status-right-length 220
set -g status-left "#[fg=#0b1020,bg=#7aa2f7,bold] #S "
set -g window-status-separator ""
set -g window-status-format "#{?window_start_flag,#[fg=#7aa2f7]#[bg=#1f2335],#[fg=#0b1020]#[bg=#1f2335]}#[fg=#8b95ad,bg=#1f2335] #I #W#{?window_flags, #{window_flags},} #[fg=#1f2335,bg=#0b1020]"
set -g window-status-current-format "#{?window_start_flag,#[fg=#7aa2f7]#[bg=#bb9af7],#[fg=#0b1020]#[bg=#bb9af7]}#[fg=#0b1020,bg=#bb9af7,bold] #I #W#{?window_flags, #{window_flags},} #[fg=#bb9af7,bg=#0b1020,nobold]"
set -g status-right "#{?pane_in_mode,#[fg=#f7768e,bg=#0b1020]#[fg=#0b1020,bg=#f7768e,bold] COPY ,}#{?window_zoomed_flag,#[fg=#e0af68,bg=#0b1020]#[fg=#0b1020,bg=#e0af68,bold] ZOOM ,}#[fg=#7dcfff,bg=#0b1020]#[fg=#0b1020,bg=#7dcfff] #(/Users/gmurray/Developer/codex-usage/target/release/codex-usage 2>/dev/null | jq -r '\"5h \\(.windows.five_hour.remaining_percent // \"?\")%% wk \\(.windows.weekly.remaining_percent // \"?\")%%\"' 2>/dev/null || echo '5h ?%% wk ?%%') #[fg=#7aa2f7,bg=#7dcfff]#[fg=#0b1020,bg=#7aa2f7] %Y-%m-%d %H:%M "

source-file ~/Developer/tmux-worktrunk-session/worktrunk.tmux
