unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

set -g xterm-keys on
set -g extended-keys on

# split panes using | and -
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel pbcopy
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel pbcopy

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind x confirm-before -p "kill-pane? (y/n)" kill-pane
bind c new-window -c "#{pane_current_path}"
bind o split-window -c "#{pane_current_path}" lf
bind g new-window -c "#{pane_current_path}" lazygit

set-option -g status-position top

#Start window indexing at 1, not 0
set -g base-index 1
set -g renumber-windows on
set -g pane-base-index 1
set -g display-panes-time 350
set-option -sg escape-time 10
set-option -g focus-events on

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

bind r source-file ~/.tmux.conf

unbind 's'
set -g @tzs-key-launch 's'

# statusline theme (inspired by screenshot)
set -g status-interval 5
set -g status-style "bg=#0b1020,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[fg=#f5a97f,bg=#0b1020,bold] #S #[fg=#7aa2f7,bg=#0b1020,bold]› "
set -g window-status-separator "  "
set -g window-status-format "#[fg=#6b7280,bg=#0b1020]#I #[fg=#4b5563]· #[fg=#8b95ad]#W"
set -g window-status-current-format "#[fg=#7aa2f7,bg=#0b1020,bold]#I #[fg=#7aa2f7,bold]• #[fg=#7aa2f7,bold]#W"
set -g status-right "#[fg=#c0caf5,bg=#0b1020] >_ #[fg=#8b95ad]#{pane_current_command} #[fg=#3b4261]| #[fg=#c0caf5]◉ #[fg=#8b95ad]CPU #(top -l 1 | awk -F'[:,% ]+' '/CPU usage/ {v=\$3+\$5; print int(v+0.5)}')%% #[fg=#3b4261]| #[fg=#c0caf5]◍ #[fg=#8b95ad]RAM #(top -l 1 | awk '/PhysMem:/ {print \$2}') "

run-shell ~/Developer/tmux-agent-session/tmux-agent-session.tmux

