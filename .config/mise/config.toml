[tools]
actionlint = "latest"
atuin = "latest"
awscli = { version = "latest", symlink_bins = "true" }
bun = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
gh = "latest"
go = "1.26.3"
imagemagick = "latest"
jq = "latest"
just = "latest"
lazygit = "latest"
ninja = "latest"
node = "latest"
pnpm = "latest"
protobuf = "latest"
ripgrep = "latest"
rust = "latest"
starship = "latest"
terraform = "latest"
tmux = "latest"
uv = "latest"
worktrunk = "latest"
yazi = "latest"
zoxide = "latest"

[bootstrap.packages]
"brew:cmake" = "latest"
"brew:curl" = "latest"
"brew:git" = "latest"
"brew:libpq" = "latest"
"brew:libyaml" = "latest"
"brew:ncurses" = "latest"
"brew:pdftk-java" = "latest"
"brew:pkgconf" = "latest"
"brew:poppler" = "latest"
"brew:tree" = "latest"
"brew:zsh-syntax-highlighting" = "latest"

[bootstrap.macos.defaults]
"com.apple.screencaptureui" = { thumbnailExpiration = 60 }

[dotfiles]
"~/.zshrc" = { mode = "symlink" }
"~/.zshenv" = { mode = "symlink" }
"~/.agents/plugins/marketplace.json" = { mode = "symlink" }
"~/.codex/AGENTS.md" = { mode = "symlink" }
"~/.codex/automations/weekly-permission-rule-review/automation.toml" = { mode = "symlink" }
"~/.codex/browser/config.toml" = { mode = "symlink" }
"~/.codex/config.toml" = { mode = "symlink" }
"~/.codex/keybindings.json" = { mode = "symlink" }
"~/.codex/rules" = { mode = "symlink" }
"~/.codex/skills" = { mode = "symlink" }
"~/plugins" = { mode = "symlink" }
"~/.config/nvim" = { mode = "symlink" }
"~/.config/starship.toml" = { mode = "symlink" }
"~/.gitconfig" = { mode = "symlink" }
"~/Library/Application Support/com.mitchellh.ghostty" = { mode = "symlink" }
"~/Library/Application Support/lazygit" = { mode = "symlink" }
"~/.config/mise/config.toml" = "~/.dotfiles/.config/mise/config.toml"

[settings]
experimental = true
dotfiles.root = "~/.dotfiles"
dotfiles.default_mode = "symlink"
