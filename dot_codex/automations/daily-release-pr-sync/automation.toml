version = 1
id = "daily-release-pr-sync"
kind = "cron"
name = "Daily Release PR Sync"
prompt = "Inspect the repository release state and open an inbox item with the result. Fetch/prune remotes first. Find the latest `release/*` branch. If a release branch exists, compare `develop` against that latest release branch. If `develop` has commits that are not in the latest release branch, compute today's release branch name as `release/YYYY-MM-DD`. If today's release branch name is different from the latest release branch, create `release/YYYY-MM-DD` from `develop`, push it, and open a draft pull request targeting `main`. If today's release branch name is the same as the latest release branch, rebase the latest release branch onto current `develop`, push the updated release branch, and update the existing release PR for that branch instead of creating a duplicate branch or PR. Whenever this automation creates or updates a release PR, make sure the PR description reflects the full current commit list on that release branch so it stays in sync after branch updates. If no `release/*` branches exist, compare `develop` to `main`; if `develop` has commits that are not on `main`, create a new `release/YYYY-MM-DD` branch from `develop`, push it, and open a draft pull request targeting `main`. Add the `release` label to every pull request created or updated by this automation. Ensure release PRs target `main`, are drafts, and have descriptions that match the branch commits. If the comparison branch already has all commits from `develop`, do not create or update a branch or PR. Avoid duplicating an existing same-day `release/YYYY-MM-DD` branch or release PR. Keep output concise: include the compared branches, commit count or short commit list, branch/PR created or updated if any, and any blocker. Do not include secrets or sensitive data in logs or PR text."
status = "ACTIVE"
rrule = "RRULE:FREQ=WEEKLY;BYHOUR=16;BYMINUTE=0;BYDAY=MO,TU,WE,TH,FR"
model = "gpt-5.4-mini"
reasoning_effort = "medium"
execution_environment = "worktree"
local_environment_config_path = "/Users/gmurray/Developer/nvsep/.codex/environments/environment.toml"
