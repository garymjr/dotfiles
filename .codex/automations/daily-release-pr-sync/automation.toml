version = 1
id = "daily-release-pr-sync"
kind = "cron"
name = "Daily Release Candidate Tag Sync"
prompt = "Fetch/prune remotes and fetch tags first. Use `main` as the default/source branch. Find release candidate tags named `vYYYY.MM.x`, where `YYYY` is the four-digit year, `MM` is the two-digit month, and `x` is an incrementing number within that month. Determine the latest existing release candidate tag overall for comparison. If no release candidate tags exist, compare `main` against an empty baseline and prepare to tag current `main` if it has commits. If the latest release candidate tag exists and already points at current `main`, do nothing. If current `main` has commits that are not included in the latest release candidate tag, create the next release candidate tag for the current month from current `main`: find existing tags matching the current month prefix `vYYYY.MM.*`, set `x` to one greater than the highest numeric suffix for that month, or `1` if none exist, then create and push `vYYYY.MM.x`. Do not create release branches. Do not open or update release pull requests. A pushed release candidate tag auto-deploys to QA. Keep output concise: include the compared ref, commit count or short commit list, tag created if any, and any blocker. Do not include secrets or sensitive data in logs or tag text."
status = "ACTIVE"
rrule = "RRULE:FREQ=WEEKLY;BYHOUR=16;BYMINUTE=0;BYDAY=MO,TU,WE,TH,FR"
model = "gpt-5.4-mini"
reasoning_effort = "medium"
execution_environment = "worktree"
